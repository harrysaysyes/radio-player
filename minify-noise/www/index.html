<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Minify Noise</title>

    <link rel="manifest" href="./manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Minify Noise">

    <meta name="theme-color" content="#0a0a0a">
    <meta name="msapplication-TileColor" content="#0a0a0a">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <canvas id="backgroundCanvas"></canvas>
    <div class="player-container" id="playerContainer">
        <div class="header">
            <div class="logo-container">
                <div class="app-name">Minify Noise</div>
            </div>
            <div class="tagline">Brown noise. Nothing else.</div>
        </div>

        <div class="play-wrap">
            <button class="play-btn" id="playBtn" aria-label="Play">
                <span class="play-icon" id="playIcon">&#9654;</span>
            </button>
            <div class="play-label" id="playLabel">Tap to play</div>
        </div>
    </div>

    <script src="js/simplex-noise.js"></script>
    <script src="js/wave-grid.js"></script>
    <script src="js/app.js"></script>
    <script>
        var canvas = document.getElementById('backgroundCanvas');
        if (canvas && window.waveGrid) {
            waveGrid.init(canvas);
        }
    </script>
</body>
</html>
