<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Minify Radio</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">

    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Minify Radio">
    <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">

    <!-- Theme Colors -->
    <meta name="theme-color" content="#2c3e50">
    <meta name="msapplication-TileColor" content="#2c3e50">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="no-selection">
    <canvas id="backgroundCanvas"></canvas>
    <div class="player-container">
        <div class="header">
            <div class="logo-container" id="logoContainer">
                <div style="color: var(--text-primary); font-size: 40px; font-weight: 900;">Minify Radio</div>
            </div>
            <div class="tagline" id="tagline">Select a station to begin</div>
        </div>

        <div class="now-playing" id="nowPlaying">
            <div class="now-playing-label">NOW PLAYING</div>
            <div class="track-info" id="trackInfo">Select a station to begin</div>
            <div class="track-artist" id="trackArtist"></div>
        </div>

        <div class="station-grid" id="stationGrid">
            <!-- Rendered dynamically by app.js -->
        </div>

        <div class="status-bar" id="statusBar">
            <span class="status-dot"></span>
            <span id="statusText">Ready</span>
        </div>

        <!-- Station Search — lives inside the player box -->
        <div id="stationModal" class="station-modal" role="dialog" aria-modal="true" aria-label="Choose a station">
            <div class="modal-backdrop"></div>
            <div class="modal-sheet">
                <div class="modal-header">
                    <h2 class="modal-title">Choose a station</h2>
                    <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
                </div>
                <div class="search-wrap">
                    <span class="search-icon">⌕</span>
                    <input id="stationSearch" type="search" class="search-input" placeholder="Search 30,000+ stations..." autocomplete="off" autocorrect="off" spellcheck="false">
                </div>
                <div id="searchResults" class="search-results">
                    <div class="search-hint">Search by name, genre or country</div>
                </div>
                <div id="colorPicker" class="color-picker hidden">
                    <div class="color-picker-row">
                        <span class="color-label">Wave</span>
                        <div class="color-swatches">
                            <button class="swatch selected" data-color="#6b7280" style="background:#6b7280" title="Slate" aria-label="Slate"></button>
                            <button class="swatch" data-color="#dc2626" style="background:#dc2626" title="Crimson" aria-label="Crimson"></button>
                            <button class="swatch" data-color="#7c3aed" style="background:#7c3aed" title="Violet" aria-label="Violet"></button>
                            <button class="swatch" data-color="#0891b2" style="background:#0891b2" title="Cyan" aria-label="Cyan"></button>
                            <button class="swatch" data-color="#059669" style="background:#059669" title="Emerald" aria-label="Emerald"></button>
                            <button class="swatch" data-color="#d97706" style="background:#d97706" title="Amber" aria-label="Amber"></button>
                        </div>
                        <button id="saveStation" class="save-btn">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/simplex-noise.js"></script>
    <script src="js/wave-grid.js"></script>
    <script src="js/app.js"></script>
    <script>
        const canvas = document.getElementById('backgroundCanvas');
        if (canvas && window.waveGrid) {
            waveGrid.init(canvas);
        }
    </script>
</body>
</html>
